<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caesar Cipher Login</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <div class="title-block">
    <h1>⟨ CIPHER ⟩</h1>
    <p>Secure Login</p>
  </div>

  <div class="card">
    <!-- Mode toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-encrypt" onclick="setMode('encrypt')">▲ Encrypt (+shift)</button>
      <button class="mode-btn" id="btn-decrypt" onclick="setMode('decrypt')">▼ Decrypt (-shift)</button>
    </div>

    <!-- Username -->
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="enter username" autocomplete="off" />
    </div>

    <!-- Password -->
    <div class="field">
      <label>Password</label>
      <div class="pw-wrapper">
        <input type="password" id="password" placeholder="enter password" autocomplete="off" oninput="updatePreview()" />
        <button class="eye-btn" onclick="toggleEye()" id="eye-btn">👁</button>
      </div>
    </div>

    <!-- Shift amount -->
    <div class="shift-row">
      <label>Shift</label>
      <div class="shift-btns">
        <button class="shift-btn" onclick="changeShift(-1)">-</button>
        <span id="shift-display">6</span>
        <button class="shift-btn" onclick="changeShift(1)">+</button>
      </div>
    </div>

    <!-- Live cipher preview -->
    <div class="cipher-preview">
      <span class="cipher-text" id="cipher-output">_</span>
    </div>

    <!-- Login button -->
    <button class="login-btn" onclick="doLogin()"> ACCESS SYSTEM </button>

    <!-- Message -->
    <div class="message" id="message"></div>

    <!-- Alphabet visualization -->
    <div class="alpha-strip" id="alpha-strip"></div>
  </div>

  <!-- Demo users hint -->
  <div class="info-box">
    DEMO ACCOUNTS — login with raw password, cipher is applied automatically:<br>
    user: <span>admin</span> | pass: <span>andrew</span> (shift 6 → <span id="hint-andrew"></span>)<br>
    user: <span>guest</span> | pass: <span>hello</span>&nbsp;&nbsp; (shift 6 → <span id="hint-hello"></span>)
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
